########################################
# VaultDynamicSecret — Database Credentials
# Syncs dynamic PostgreSQL credentials from Vault's database engine
# into a standard Kubernetes Secret. The application reads DB_USERNAME
# and DB_PASSWORD from the K8s Secret — no Vault SDK needed.
#
# Using VaultDynamicSecret (not VaultStaticSecret) because database
# credentials are generated on demand with a lease/TTL.
########################################
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultDynamicSecret
metadata:
  name: db-creds
  namespace: app
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  vaultAuthRef: vault-auth
  mount: database
  path: creds/readwrite
  # Renew the lease when 67% of the TTL has elapsed
  renewalPercent: 67
  # Revoke the lease on Secret deletion
  revoke: true
  destination:
    name: db-credentials
    create: true
    labels:
      app.kubernetes.io/part-of: demo-app
    type: Opaque
    transformation:
      excludeRaw: true
      templates:
        DB_HOST:
          text: '{{ .Secrets.db_host | default "secrets-vault-postgres.xxxx.eu-west-2.rds.amazonaws.com" }}'
        DB_PORT:
          text: "5432"
        DB_NAME:
          text: appdb
        DB_USERNAME:
          text: "{{ .Secrets.username }}"
        DB_PASSWORD:
          text: "{{ .Secrets.password }}"
        DB_SSLMODE:
          text: require
  # Restart the deployment when credentials are rotated
  rolloutRestartTargets:
    - kind: Deployment
      name: demo-app
