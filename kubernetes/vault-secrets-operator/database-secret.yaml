########################################
# VaultDynamicSecret — Database Credentials
# Syncs dynamic PostgreSQL credentials from Vault's database engine
# into a standard Kubernetes Secret. The application reads username
# and password from the K8s Secret — no Vault SDK needed.
#
# Using VaultDynamicSecret (not VaultStaticSecret) because database
# credentials are generated on demand with a lease/TTL.
########################################
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultDynamicSecret
metadata:
  name: db-creds
  namespace: app
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  vaultAuthRef: vault-auth
  mount: database
  path: creds/readwrite
  # Renew the lease when 67% of the TTL has elapsed
  renewalPercent: 67
  # Revoke the lease on Secret deletion
  revoke: true
  destination:
    name: db-credentials
    create: true
    labels:
      app.kubernetes.io/part-of: demo-app
    type: Opaque
  # Restart the deployment when credentials are rotated
  rolloutRestartTargets:
    - kind: Deployment
      name: demo-app
