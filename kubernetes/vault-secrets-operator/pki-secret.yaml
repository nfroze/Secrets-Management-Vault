########################################
# VaultPKISecret — TLS Certificate
# Requests a certificate from Vault's intermediate CA for
# service-to-service TLS. VSO handles renewal automatically.
########################################
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultPKISecret
metadata:
  name: app-tls-cert
  namespace: app
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  vaultAuthRef: vault-auth
  mount: pki_int
  role: internal-service
  commonName: demo-app.app.svc.cluster.local
  altNames:
    - demo-app.app.svc
  format: pem
  ttl: 72h
  expiryOffset: 24h
  destination:
    name: app-tls-certificate
    create: true
    labels:
      app.kubernetes.io/part-of: demo-app
    type: kubernetes.io/tls
  rolloutRestartTargets:
    - kind: Deployment
      name: demo-app
