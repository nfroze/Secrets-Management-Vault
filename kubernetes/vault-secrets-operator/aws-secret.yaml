########################################
# VaultDynamicSecret — AWS IAM Credentials
# Syncs dynamic AWS credentials from Vault's AWS secrets engine
# into a Kubernetes Secret. Application reads access_key and
# secret_key from the synced K8s Secret.
########################################
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultDynamicSecret
metadata:
  name: aws-creds
  namespace: app
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  vaultAuthRef: vault-auth
  mount: aws
  path: creds/s3-readwrite
  renewalPercent: 67
  revoke: true
  destination:
    name: aws-credentials
    create: true
    labels:
      app.kubernetes.io/part-of: demo-app
    type: Opaque
  rolloutRestartTargets:
    - kind: Deployment
      name: demo-app
