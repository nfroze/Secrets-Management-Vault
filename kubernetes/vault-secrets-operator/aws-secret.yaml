########################################
# VaultDynamicSecret — AWS IAM Credentials
# Syncs dynamic AWS credentials from Vault's AWS secrets engine
# into a Kubernetes Secret. Application reads standard AWS_ACCESS_KEY_ID
# and AWS_SECRET_ACCESS_KEY environment variables.
########################################
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultDynamicSecret
metadata:
  name: aws-creds
  namespace: app
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  vaultAuthRef: vault-auth
  mount: aws
  path: creds/s3-readwrite
  renewalPercent: 67
  revoke: true
  destination:
    name: aws-credentials
    create: true
    labels:
      app.kubernetes.io/part-of: demo-app
    type: Opaque
    transformation:
      excludeRaw: true
      templates:
        AWS_ACCESS_KEY_ID:
          text: "{{ .Secrets.access_key }}"
        AWS_SECRET_ACCESS_KEY:
          text: "{{ .Secrets.secret_key }}"
        AWS_DEFAULT_REGION:
          text: eu-west-2
  rolloutRestartTargets:
    - kind: Deployment
      name: demo-app
