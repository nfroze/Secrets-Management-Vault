########################################
# VaultStaticSecret — Transit Engine Configuration
# Syncs the transit key metadata from Vault into a K8s Secret
# so the application knows the key exists and its properties.
# The transit key itself never leaves Vault — only metadata
# is stored in Kubernetes.
########################################
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: transit-config
  namespace: app
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  vaultAuthRef: vault-auth
  mount: transit
  path: keys/app-data
  type: kv-v1
  refreshAfter: 1h
  destination:
    name: transit-config
    create: true
    labels:
      app.kubernetes.io/part-of: demo-app
    type: Opaque
