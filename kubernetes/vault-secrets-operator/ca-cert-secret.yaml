########################################
# CA Certificate Secret for VSO VaultConnection
# This copies the Vault CA cert into the VSO namespace
# so VaultConnection can verify Vault's TLS certificate.
#
# In production, this would be populated by the TLS generation script.
# The data below is a placeholder — replace after running generate-vault-tls.sh.
########################################
apiVersion: v1
kind: Secret
metadata:
  name: vault-tls-ca
  namespace: vault-secrets-operator-system
  labels:
    app.kubernetes.io/part-of: vault-secrets-operator
type: Opaque
data:
  # Base64-encoded Vault CA certificate
  # Populate with: kubectl create secret generic vault-tls-ca \
  #   --namespace=vault-secrets-operator-system \
  #   --from-file=ca.crt=vault/tls/ca.crt \
  #   --dry-run=client -o yaml | kubectl apply -f -
  ca.crt: ""
