########################################
# ServiceMonitor — Prometheus scrape config for Vault
# Vault exposes /v1/sys/metrics in Prometheus format on port 8200.
# The telemetry listener is configured with
# unauthenticated_metrics_access = true in the Helm values.
########################################
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vault
  namespace: monitoring
  labels:
    app.kubernetes.io/name: vault
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - vault
  selector:
    matchLabels:
      app.kubernetes.io/name: vault
  endpoints:
    - port: https
      path: /v1/sys/metrics
      params:
        format: ["prometheus"]
      interval: 30s
      scrapeTimeout: 10s
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
