########################################
# CI/CD Pipeline — Vault-Integrated Deployment
#
# Authenticates to Vault via AppRole to retrieve deployment secrets.
# No long-lived credentials stored in GitHub — only the AppRole
# Role ID and a wrapped Secret ID are used.
#
# Flow:
#   1. Build and scan Docker image
#   2. Authenticate to Vault via AppRole
#   3. Retrieve AWS credentials from Vault
#   4. Push image to ECR
#   5. Deploy to EKS
########################################

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "kubernetes/**"
      - ".github/workflows/deploy.yaml"
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  EKS_CLUSTER: secrets-vault-eks
  ECR_REPO: secrets-vault-demo
  APP_NAMESPACE: app

permissions:
  contents: read
  id-token: write

jobs:
  # =========================================================
  # Stage 1: Build, scan, and push container image
  # =========================================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Vault Authentication via AppRole
      # The Role ID is stored as a GitHub secret (non-sensitive identifier).
      # The Secret ID is generated per-run via a wrapped token.
      # -------------------------------------------------------
      - name: Authenticate to Vault
        id: vault-auth
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            aws/creds/s3-readwrite access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/s3-readwrite secret_key | AWS_SECRET_ACCESS_KEY

      # -------------------------------------------------------
      # AWS Authentication (using Vault-generated credentials)
      # -------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # -------------------------------------------------------
      # Docker Build
      # -------------------------------------------------------
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # -------------------------------------------------------
      # Security Scanning
      # -------------------------------------------------------
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:latest
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  # =========================================================
  # Stage 2: Deploy to EKS
  # =========================================================
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Vault auth for AWS credentials (deploy needs EKS access)
      - name: Authenticate to Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            aws/creds/s3-readwrite access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/s3-readwrite secret_key | AWS_SECRET_ACCESS_KEY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Update image tag and deploy
      - name: Deploy to EKS
        run: |
          IMAGE="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}"

          # Update image in deployment
          kubectl set image deployment/demo-app \
            demo-app="${IMAGE}" \
            -n ${{ env.APP_NAMESPACE }}

          # Wait for rollout
          kubectl rollout status deployment/demo-app \
            -n ${{ env.APP_NAMESPACE }} \
            --timeout=120s

      - name: Verify deployment
        run: |
          echo "Pod status:"
          kubectl get pods -n ${{ env.APP_NAMESPACE }} -l app.kubernetes.io/name=demo-app

          echo ""
          echo "Synced secrets:"
          kubectl get secrets -n ${{ env.APP_NAMESPACE }} -l app.kubernetes.io/part-of=demo-app
