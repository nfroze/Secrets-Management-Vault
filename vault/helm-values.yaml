########################################
# HashiCorp Vault Helm Chart Values
# HA mode with Raft integrated storage
# AWS KMS auto-unseal via IRSA
########################################

global:
  enabled: true
  tlsDisable: false

# Disable the Agent Sidecar Injector — we use Vault Secrets Operator instead
injector:
  enabled: false

server:
  # Container image
  image:
    repository: hashicorp/vault
    tag: "1.15.4"

  # Resource limits
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

  # IRSA service account — Vault uses this for KMS auto-unseal and AWS secrets engine
  serviceAccount:
    create: true
    name: vault
    annotations:
      eks.amazonaws.com/role-arn: "${VAULT_IAM_ROLE_ARN}"

  # Extra volumes — RDS CA certificate for database secrets engine SSL
  extraVolumes:
    - type: secret
      name: rds-ca-bundle
      path: /vault/certs

  # Readiness probe — standbyok allows standby replicas to receive traffic
  # sealedcode=204 and uninitcode=204 prevent sealed/uninit pods from being killed
  readinessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

  # Liveness probe — longer delay to allow init/unseal to complete
  livenessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true"
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 5

  # Audit log volume
  auditStorage:
    enabled: true
    size: 10Gi
    storageClass: vault-storage
    accessMode: ReadWriteOnce

  # Raft data storage
  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: vault-storage
    accessMode: ReadWriteOnce

  # HA mode with 3 replicas
  ha:
    enabled: true
    replicas: 3

    # Raft integrated storage configuration
    raft:
      enabled: true

      # Prevent UUID regeneration on pod restart — critical for quorum stability
      setNodeId: true

      config: |
        ui = true

        listener "tcp" {
          tls_disable     = false
          address         = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_cert_file   = "/vault/tls/tls.crt"
          tls_key_file    = "/vault/tls/tls.key"
          telemetry {
            unauthenticated_metrics_access = true
          }
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_api_addr         = "https://vault-0.vault-internal:8200"
            leader_ca_cert_file     = "/vault/tls/ca.crt"
            leader_client_cert_file = "/vault/tls/tls.crt"
            leader_client_key_file  = "/vault/tls/tls.key"
          }

          retry_join {
            leader_api_addr         = "https://vault-1.vault-internal:8200"
            leader_ca_cert_file     = "/vault/tls/ca.crt"
            leader_client_cert_file = "/vault/tls/tls.crt"
            leader_client_key_file  = "/vault/tls/tls.key"
          }

          retry_join {
            leader_api_addr         = "https://vault-2.vault-internal:8200"
            leader_ca_cert_file     = "/vault/tls/ca.crt"
            leader_client_cert_file = "/vault/tls/tls.crt"
            leader_client_key_file  = "/vault/tls/tls.key"
          }
        }

        seal "awskms" {
          region     = "${AWS_REGION}"
          kms_key_id = "${KMS_KEY_ID}"
        }

        telemetry {
          prometheus_retention_time = "30s"
          disable_hostname         = true
        }

        service_registration "kubernetes" {}

  # Security context — hardened container runtime
  securityContext:
    container:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
        add:
          - IPC_LOCK
      runAsNonRoot: true
      runAsUser: 100
      runAsGroup: 1000
    pod:
      runAsNonRoot: true
      runAsUser: 100
      runAsGroup: 1000
      fsGroup: 1000

  # Pod disruption budget — maintain quorum during node maintenance
  disruptionBudget:
    maxUnavailable: 1

  # Anti-affinity — spread Vault pods across nodes/AZs
  affinity: |
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: vault
              component: server
          topologyKey: kubernetes.io/hostname
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: vault
                component: server
            topologyKey: topology.kubernetes.io/zone

  # Topology spread — even distribution across AZs
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: vault
          component: server

  # Network policy
  networkPolicy:
    enabled: true
    egress: []

# Vault UI — accessible via port-forward for screenshots
ui:
  enabled: true
  serviceType: ClusterIP
